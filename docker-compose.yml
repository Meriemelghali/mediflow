services:

  # ─────────────────────────────────────────────
  #  INFRASTRUCTURE
  # ─────────────────────────────────────────────

  discovery-service:
    profiles:
      - full
    build:
      context: ./Backend/infrastructure/discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - mediflow-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  config-server:
    profiles:
      - full
    build:
      context: ./Backend/infrastructure/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    profiles:
      - full
    build:
      context: ./Backend/infrastructure/api-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # ─────────────────────────────────────────────
  #  MESSAGE BROKER
  # ─────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: mediflow
      RABBITMQ_DEFAULT_PASS: mediflow123
    networks:
      - mediflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─────────────────────────────────────────────
  #  SECURITY - KEYCLOAK
  # ─────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    networks:
      - mediflow-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep '200 OK'"]
      interval: 30s
      timeout: 15s
      retries: 10
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/mediflow-realm.json:/opt/keycloak/data/import/mediflow-realm.json

  # ─────────────────────────────────────────────
  #  MICROSERVICES
  # ─────────────────────────────────────────────

  exam-service:
    profiles:
      - full
    build:
      context: ./Backend/services/exam-service
    container_name: exam-service
    ports:
      - "8085:8085"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=mediflow
      - SPRING_RABBITMQ_PASSWORD=mediflow123
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  appointment-service:
    profiles:
      - full
    build:
      context: ./Backend/services/appointment-service
    container_name: appointment-service
    ports:
      - "8082:8082"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediflow_appointment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  room-service:
    profiles:
      - full
    build:
      context: ./Backend/services/room-service
    container_name: room-service
    ports:
      - "8088:8088"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  assurance-service:
    profiles:
      - full
    build:
      context: ./Backend/services/assurance-service
    container_name: assurance-service
    ports:
      - "8083:8083"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/assurance_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=mediflow
      - SPRING_RABBITMQ_PASSWORD=mediflow123
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  patient-service:
    profiles:
      - full
    build:
      context: ./Backend/services/patient-service
    container_name: patient-service
    ports:
      - "8089:8089"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8089
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  #  DATABASES
  # ─────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    networks:
      - mediflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assurance_db
    ports:
      - "5432:5432"
    networks:
      - mediflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ==========================================
  # Node.js Services
  # ==========================================
  user-service:
    profiles:
      - full
    build:
      context: ./Backend/services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=development
    networks:
      - mediflow-network

  notification-service:
    profiles:
      - full
    build:
      context: ./Backend/services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      - NODE_ENV=development
    networks:
      - mediflow-network
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ==========================================
  # Java Spring Boot Services
  # ==========================================
  billing-service:
    profiles:
      - full
    build:
      context: ./Backend/services/billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "8084:8084"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediflow_billing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=mediflow
      - SPRING_RABBITMQ_PASSWORD=mediflow123
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  pharmacy-service:
    profiles:
      - full
    build:
      context: ./Backend/services/pharmacy-service
      dockerfile: Dockerfile
    container_name: pharmacy-service
    ports:
      - "8087:8087"
    networks:
      - mediflow-network
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/pharmacy_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/mediflow-realm
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    profiles:
      - full
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    networks:
      - mediflow-network
    depends_on:
      - api-gateway

networks:
  mediflow-network:
    driver: bridge

volumes:
  rabbitmq_data:
  keycloak_data:
  mysql_data:
  postgres_data:
