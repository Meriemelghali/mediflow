services:
  # ==========================================
  # Message Broker (RabbitMQ)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # Port for AMQP communication
      - "15672:15672" # Port for Management UI
    networks:
      - mediflow-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Node.js Services
  # ==========================================
  user-service:
    build:
      context: ./Backend/services/user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=development
    networks:
      - mediflow-network

  # ==========================================
  # Java Spring Boot Services
  # ==========================================
  billing-service:
    build:
      context: ./Backend/services/billing-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    networks:
      - mediflow-network

  pharmacy-service:
    build:
      context: ./Backend/services/pharmacy-service
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    networks:
      - mediflow-network

networks:
  mediflow-network:
    driver: bridge
