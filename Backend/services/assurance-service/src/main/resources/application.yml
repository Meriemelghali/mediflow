server:
  port: 0

spring:
  application:
    name: assurance-service
  config:
    import: optional:configserver:http://localhost:8888
  # Production-ready datasource: PostgreSQL (change credentials as needed)
  datasource:
    url: jdbc:postgresql://localhost:5432/assurance_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  rabbitmq:
    host: localhost
    port: 5672
    username: mediflow
    password: mediflow123
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/mediflow-realm

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.hibernate.SQL: debug
