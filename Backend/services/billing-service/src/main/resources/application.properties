# ===== Application =====
spring.application.name=billing-service
server.port=8084

# ===== Config Server =====
spring.config.import=optional:configserver:http://localhost:8888

# ===== RabbitMQ =====
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=mediflow
spring.rabbitmq.password=mediflow123

# ===== Security (Keycloak resource server) =====
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mediflow-realm

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/mediflow_billing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Eureka Client =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===== OpenAPI / Swagger =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
