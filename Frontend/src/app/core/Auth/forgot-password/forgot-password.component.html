<section class="auth-page">
  <aside class="auth-panel">
    <div class="panel-content">
      <div class="panel-logo">
        <img src="logo.png" alt="MediFlow" class="panel-logo-img" />
      </div>
      <h1 class="panel-title">Retrouvez votre acces MediFlow.</h1>
      <p class="panel-desc">Nous vous envoyons un lien securise pour choisir un nouveau mot de passe.</p>
    </div>
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
  </aside>

  <main class="auth-form-side">
    <div class="form-card">
      <div class="form-header">
        <h2 class="form-title">Mot de passe oublie</h2>
        <p class="form-subtitle">Entrez l'adresse email associee a votre compte.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="field" [class.field-error]="email?.invalid && email?.touched">
          <label class="field-label" for="forgot-email">Adresse email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input id="forgot-email" type="email" formControlName="email" class="field-input" placeholder="nom@exemple.com" autocomplete="email" />
          </div>
          <span class="field-hint" *ngIf="email?.errors?.['required'] && email?.touched">L'email est requis.</span>
          <span class="field-hint" *ngIf="email?.errors?.['email'] && email?.touched">Format d'email invalide.</span>
        </div>

        <div class="success-alert" *ngIf="successMessage">{{ successMessage }}</div>
        <div class="error-alert" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="!loading">Envoyer le lien</span>
          <span *ngIf="loading" class="loader-dots"><span></span><span></span><span></span></span>
        </button>
      </form>

      <div class="form-footer">
        <a routerLink="/login" class="link-accent">Retour a la connexion</a>
      </div>
    </div>
  </main>
</section>
