<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-top">
      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 10h-5V5a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v5H5a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h5v5a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-5h5a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1z"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">MediFlow</span>
          <span class="brand-tag">Système médical</span>
        </div>
      </div>

      <!-- Divider -->
      <div class="sidebar-divider"></div>

      <!-- Nav -->
      <nav class="sidebar-nav">
        <p class="nav-label">Navigation</p>

        <a class="nav-item" routerLink="/appointments" routerLinkActive="is-active">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Rendez-vous</span>
          <span class="nav-indicator"></span>
        </a>

        <a class="nav-item" routerLink="/assurance" routerLinkActive="is-active">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-11V5l-8-3-8 3v6c0 7 8 11 8 11z"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
          <span>Assurance</span>
          <span class="nav-indicator"></span>
        </a>

        <a class="nav-item" routerLink="/exams" routerLinkActive="is-active">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span>Examens</span>
          <span class="nav-indicator"></span>
        </a>

        <a class="nav-item" routerLink="/pharmacy" routerLinkActive="is-active">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
            <path d="m8.5 8.5 7 7"/>
          </svg>
          <span>Pharmacie</span>
          <span class="nav-indicator"></span>
        </a>
      </nav>
    </div>

    <!-- Footer clock -->
    <div class="sidebar-bottom">
      <div class="clock">
        <div class="clock-pulse"></div>
        <div class="clock-body">
          <span class="clock-time">{{ timeString }}</span>
          <span class="clock-date">{{ dateString }}</span>
        </div>
      </div>
      <span class="version">v1.0.0-beta</span>
    </div>

  </aside>

  <!-- ── Main content ── -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
